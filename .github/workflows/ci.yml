# =============================================================================
# ci.yml
# Laboratorio 7 - Parte B: CI/CD con GitHub Actions
# Ubicacion: .github/workflows/ci.yml
# -----------------------------------------------------------------------------
# PROPOSITO EDUCATIVO
# Pipeline de integracion continua que protege la reingenieria del sistema:
#
#   1. restore  -> baja las dependencias NuGet
#   2. build    -> compila en Release (falla si hay errores de compilacion)
#   3. test     -> ejecuta la suite de tests de caracterizacion (golden master).
#                  Si un test se rompe (regresion), el pipeline se pone en ROJO.
#   4. SonarQube-> analisis estatico de calidad (job opcional, solo si hay
#                  secrets configurados).
#
# Se ejecuta en cada push y pull_request contra la rama principal.
#
# NOTA: el enunciado original del laboratorio usaba .NET 8; este proyecto y los
# microservicios gRPC del curso apuntan a .NET 10, por eso aqui se instala el
# SDK 10.0.x.
# =============================================================================

name: CI Reingenieria - SistemaInventarioLegacy

on:
  push:
    branches: [ master, main, 'lab7/**' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:   # Permite ejecutarlo manualmente desde la pestana Actions

# Permisos minimos (principio de privilegio minimo)
permissions:
  contents: read

jobs:
  # ===========================================================================
  # JOB 1: Compilacion + Tests de caracterizacion
  # ===========================================================================
  build-test:
    name: Build y Tests de Caracterizacion
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo (lo aprovecha SonarQube)

      - name: Instalar .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependencias
        run: dotnet restore

      - name: Compilar en Release
        run: dotnet build --no-restore -c Release

      # Ejecuta la suite de tests. --logger trx deja un reporte que se publica
      # como artefacto descargable (evidencia para el informe).
      - name: Ejecutar tests de caracterizacion
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Publicar resultados de tests
        if: always()   # subir aunque algun test haya fallado
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: ./TestResults
          retention-days: 30

  # ===========================================================================
  # JOB 2: Analisis de calidad con SonarQube
  # Solo corre si el job de build/test paso Y existen los secrets del servidor.
  # Configure en el repo: Settings -> Secrets and variables -> Actions
  #   - SONAR_TOKEN
  #   - SONAR_HOST_URL
  # NUNCA escriba estos valores directamente en el archivo.
  # ===========================================================================
  sonarqube:
    name: Analisis SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-test
    # Evita que el job falle en forks o PRs sin acceso a los secrets.
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Instalar Java 17 (requerido por el scanner de SonarQube)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Analisis SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Si no hay token configurado, se omite el analisis sin romper el build.
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "::warning::SONAR_TOKEN / SONAR_HOST_URL no configurados. Se omite el analisis SonarQube."
            exit 0
          fi
          dotnet tool install --global dotnet-sonarscanner
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet sonarscanner begin \
            /k:"inventario-legacy" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.token="$SONAR_TOKEN"
          dotnet build -c Release
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
